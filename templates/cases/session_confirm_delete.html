{% extends 'base.html' %}
{% block title %}حذف الجلسة{% endblock %}
{% block page_title %}حذف الجلسة{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header confirm-danger-header">
                <h5 class="text-danger"><i class="fas fa-exclamation-triangle me-2"></i>تأكيد حذف الجلسة</h5>
            </div>
            <div class="card-body confirm-danger-body">
                <div class="confirm-danger-icon"><i class="fas fa-calendar-times"></i></div>
                <h5 class="fw-700 mb-2">هل أنت متأكد من حذف هذه الجلسة؟</h5>
                <p class="text-muted mb-4">جلسة بتاريخ: <strong>{{ session.session_date|date:"d/m/Y" }}</strong></p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <a href="{% url 'case_detail' session.case.pk %}" class="btn btn-outline-secondary">إلغاء</a>
                    <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> نعم، احذف</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
