{% extends 'base.html' %}
{% block title %}حذف المستند{% endblock %}
{% block page_title %}حذف المستند{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header" style="background:#fef2f2;">
                <h5 class="text-danger"><i class="fas fa-exclamation-triangle me-2"></i>تأكيد حذف المستند</h5>
            </div>
            <div class="card-body text-center" style="padding:32px;">
                <div style="font-size:52px;color:#fca5a5;margin-bottom:16px;">
                    <i class="fas {{ doc.get_file_icon }}"></i>
                </div>
                <h5 class="fw-700 mb-2">هل أنت متأكد من حذف هذا المستند؟</h5>
                <p class="text-muted mb-4"><strong>{{ doc.title }}</strong></p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <a href="{% url 'document_list' %}" class="btn btn-outline-secondary">إلغاء</a>
                    <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> نعم، احذف</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
